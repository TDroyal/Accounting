# 本地开发配置示例。复制为 config.yaml 并填入真实值（config.yaml 已被 .gitignore 忽略）。
# 敏感字段可被环境变量覆盖：ACCT_MYSQL_PASSWORD / ACCT_REDIS_PASSWORD / ACCT_JWT_SECRET
server:
  port: "8080"
  mode: debug          # debug / release

mysql:
  host: 127.0.0.1
  port: "3306"
  username: root
  password: ""         # 建议用环境变量 ACCT_MYSQL_PASSWORD 覆盖
  database: accounting

redis:
  addr: 127.0.0.1:6379
  password: ""         # 建议用环境变量 ACCT_REDIS_PASSWORD 覆盖
  db: 0

jwt:
  secret: ""           # 必填，建议用环境变量 ACCT_JWT_SECRET 覆盖
  expire: 168h         # 7 天

log:
  level: info          # info / warn / error
  output: stdout

limit:
  login_per_minute: 10
  transaction_per_minute: 60
